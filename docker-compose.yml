services:

  # ─── Next.js Dashboard ───────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_N8N_WEBHOOK_URL: ${NEXT_PUBLIC_N8N_WEBHOOK_URL}
    container_name: medgulf-dashboard
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    expose:
      - "3000:3000"
    networks:
      - medgulf-net
    
      

networks:
  medgulf-net:
    external: true

volumes:
  letsencrypt: